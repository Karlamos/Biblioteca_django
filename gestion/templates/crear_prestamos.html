{% extends "index.html"%}
{% block contenido %}

<h2> Crear prestamos </h2>

<form method="POST">
    {% csrf_token %}
    <label for="id_libro" name="libro"> Libro: </label>
    <select type="text" id="id_libro" name="libro" required>
        <option value="">Usuario</option>
        {%for libro in libros%}
            <option value="{{libro.id}}">{{libro.titulo}}</option>
        {%endfor%}
    </select>

    <label for="id_usuario" name="autor"> Usuario: </label>
    <select type="text" id="id_usuario" name="usuario" required>
        <option value="">seleccionar Usuario</option>
        {%for usuario in usuarios%}
            <option value="{{usuario.id}}">{{usuario.username}}</option>
        {%endfor%}
    </select><br>

    <label for="id_usuario" name="autor"> Usuario: </label>
    <input type="date" id="id_fecha_prestamo" name="fecha_prestamo" value="{{fecha}}" required></br>

    <button type="submit"> Crear </button>

</form>

{% endblock %}
