<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Biblioteca</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #0d0d0f;
            color: #e0d6ff;
            font-family: "Segoe UI", sans-serif;
        }

        /* Sidebar */
        .sidebar {
            width: 250px;
            height: 100vh;
            background-color: #111;
            padding-top: 30px;
            position: fixed;
            border-right: 1px solid #6a0dad;
        }

        .sidebar .menu-title {
            color: #b37aff;
            font-size: 1.2rem;
            padding-left: 20px;
            margin-bottom: 25px;
            font-weight: bold;
        }

        .sidebar a {
            text-decoration: none;
            padding: 12px 20px;
            display: block;
            font-size: 1rem;
            color: #d9baff;
            transition: .2s;
        }

        .sidebar a:hover {
            background-color: #6a0dad33;
            color: #ffffff;
        }

        /* Contenido */
        .content {
            margin-left: 250px;
            padding: 30px;
        }

        .card {
            background-color: #1a1a1d;
            border: 1px solid #6a0dad55;
        }

        .card-title {
            color: #caa5ff;
        }

        .btn-purple {
            background-color: #6a0dad;
            color: white;
        }
        .btn-purple:hover {
            background-color: #580b9e;
        }
    </style>
</head>

<body>

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="menu-title">📚 Biblioteca</div>

        <a href="{% url 'lista_autores'%}">Autores</a>
        <a href="{% url 'lista_prestamos' %}">Préstamos</a>
        <a href="{% url 'lista_multa' %}">Multas</a>
        <a href="{% url 'lista_libros' %}">Libros</a>
    </div>

    <!-- CONTENIDO -->
    <div class="content">
        <h1 class="mb-4" style="color: #caa5ff;">Dashboard de Biblioteca</h1>

        {% block contenido %}
        {% endblock %}
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
